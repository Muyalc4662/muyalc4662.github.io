name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A8B044: ${{ secrets.A8B044 }}
          B883BF: ${{ secrets.B883BF }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A8B044', '')
          meta_b = os.environ.get('B883BF', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 2626ec7284ac29a90373a2d4e753bc -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 08aff0abba44ed94e87dda2cd512d699c404b94b -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
